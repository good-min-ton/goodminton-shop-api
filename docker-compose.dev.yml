version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: goodminton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goodminton
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgresql123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: goodminton-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
