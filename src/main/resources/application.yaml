spring:
  application:
    name: goodminton-shop-api   
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/goodminton?stringtype=unspecified
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate: 
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  flyway:
    enabled: true
    locations:
    - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
