server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: goodminton-shop-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: optional:file:.env.${spring.profiles.active}[.properties]

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:goodminton}?stringtype=unspecified
    username: ${POSTGRES_USERNAME:admin}
    password: ${POSTGRES_PASSWORD:postgresql123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jwt:
    issuer-uri: goodminton
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXP:600000}
    refresh-token-expiration: ${JWT_REFRESH_EXP:604800000}
  mail:
    host: smtp.gmail.com
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  webhook-url: ${PAYOS_WEBHOOK_URL}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}

app:
  frontend-url: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL}
    phone: ${ADMIN_PHONE}
    password: ${ADMIN_PASSWORD}
