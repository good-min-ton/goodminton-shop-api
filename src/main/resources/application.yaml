spring:
  application:
    name: goodminton-shop-api

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/goodminton?stringtype=unspecified
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    format-sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: goodminton
          secret-key: ${JWT_SECRET}
          access-token:
            expiration: 600000
          refresh-token:
            expiration: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE
