spring:
  application:
    name: goodminton-shop-api   
  datasource:
    url: jdbc:postgresql://localhost:5433/goodminton?stringtype=unspecified
    username: admin
    password: postgresql123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate: 
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  
  flyway:
    enabled: true
    locations:
    - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
