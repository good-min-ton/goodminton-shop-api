server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: goodminton-shop-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:goodminton}?stringtype=unspecified
    username: ${POSTGRES_USERNAME:admin}
    password: ${POSTGRES_PASSWORD:postgresql123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jwt:
    issuer-uri: goodminton
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXP:600000}
    refresh-token-expiration: ${JWT_REFRESH_EXP:604800000}
  mail:
    host: smtp.gmail.com
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder-prefix: ${CLOUDINARY_FOLDER_PREFIX:goodminton}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

order:
  auto-complete-days: ${ORDER_AUTO_COMPLETE_DAYS:7}

vnpay:
  tmn-code: ${VNP_TMN_CODE}
  hash-secret: ${VNP_HASH_SECRET}
  pay-url: ${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  api-url: ${VNP_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
  return-url: ${VNP_RETURN_URL}
  payment-timeout-minutes: 15

app:
  frontend-url: ${FRONTEND_URL}
  internal-api-key: ${INTERNAL_API_KEY}
  admin:
    email: ${ADMIN_EMAIL}
    phone: ${ADMIN_PHONE}
    password: ${ADMIN_PASSWORD}
  store-admin:
    email: ${STORE_ADMIN_EMAIL}
    phone: ${STORE_ADMIN_PHONE}
    password: ${STORE_ADMIN_PASSWORD}

rabbitmq:
  exchange:
    products: goodminton.products
  queue:
    rag-product-sync: rag.product.sync
    rag-product-sync-dlq: rag.product.sync.dlq

