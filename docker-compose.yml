version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: goodminton-api:1.0
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_CONTAINER_HOST}:${POSTGRES_CONTAINER_PORT}/goodminton?stringtype=unspecified
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_CONTAINER_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_CONTAINER_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      - PAYOS_WEBHOOK_URL=${PAYOS_WEBHOOK_URL}
      - PAYOS_RETURN_URL=${PAYOS_RETURN_URL}
      - PAYOS_CANCEL_URL=${PAYOS_CANCEL_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - goodminton-network

  postgres: 
    image: postgres:15
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    environment:
      - POSTGRES_DB=goodminton
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/V1__init_schema.sql:/docker-entrypoint-initdb.d/V1__init_schema.sql
      - ./src/main/resources/db/migration/V2__init_super_admin.sql:/docker-entrypoint-initdb.d/V2__init_super_admin.sql
      - ./src/main/resources/db/migration/V3__init_distributor_account.sql:/docker-entrypoint-initdb.d/V3__init_distributor_account.sql
      - ./src/main/resources/db/migration/V4__create_indexes.sql:/docker-entrypoint-initdb.d/V4__create_indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goodminton-network

  redis:
    image: redis:8.2-alpine3.22
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - goodminton-network

networks:
  goodminton-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: