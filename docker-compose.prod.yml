services:
  postgres:
    image: pgvector/pgvector:pg15 # postgres:15 + pgvector extension built-in
    container_name: goodminton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: goodminton-redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: goodminton-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: goodminton-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    # GPU passthrough — host needs NVIDIA driver + nvidia-container-toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # One-shot: pull models into the ollama volume. No-op when models already exist.
  ollama-init:
    image: ollama/ollama:latest
    container_name: goodminton-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "ollama pull bge-m3 && ollama pull qwen2.5:14b-instruct-q4_K_M" ]

  shop-api:
    image: ${DOCKER_USERNAME}/goodminton-shop-api:latest
    container_name: goodminton-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  rag-service:
    image: ${DOCKER_USERNAME}/goodminton-rag-service:latest
    container_name: goodminton-rag
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "${RAG_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      LLM_MODEL: qwen2.5:14b-instruct-q4_K_M
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SHOP_API_URL: http://shop-api:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

  # One-shot: repopulate kb_chunks after a volume wipe. Skips when data exists.
  rag-init:
    image: ${DOCKER_USERNAME}/goodminton-rag-service:latest
    container_name: goodminton-rag-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      shop-api:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      SHOP_API_URL: http://shop-api:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    command: [ "uv", "run", "python", "scripts/bootstrap.py" ]

volumes:
  postgres_data:
  rabbitmq_data:
  ollama_data:
